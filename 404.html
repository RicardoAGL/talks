<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<script>
// GitHub Pages SPA fallback for talk slides.
// Fired when a path like /talks/writing-coach/3 has no file.
// Redirect to the talk root so the SPA loads from slide 1.
var parts = location.pathname.split('/').filter(Boolean);
if (parts[0] === 'talks' && parts[1]) {
  location.replace('/' + parts[0] + '/' + parts[1] + '/');
} else {
  location.replace('/talks/');
}
</script>
</head>
</html>
